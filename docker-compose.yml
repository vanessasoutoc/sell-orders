services:
  api:
    container_name: api
    build:
      context: ./api
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run start:dev
    volumes:
      - ./api:/app
      - /app/node_modules
    env_file:
      - ./api/.env
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    container_name: front-end
    build:
      context: ./front-end
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run dev
    volumes:
      - ./front-end:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./front-end/.env.local
    environment:
      - API_URL=http://api:3000
    ports:
      - "3001:3001"
    depends_on:
      - api
    restart: unless-stopped

  mysql:
    container_name: mysql
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nestdb
      MYSQL_USER: nest
      MYSQL_PASSWORD: nest123
      TZ: America/Sao_Paulo
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data: